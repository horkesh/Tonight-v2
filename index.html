
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tonight | Virtual Connection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dynamic Theme Variables */
            --color-bg-base: #020617;   /* Default: Slate 950 */
            --color-bg-card: #0f172a;   /* Default: Slate 900 */
            --color-primary: #e11d48;   /* Default: Rose 600 */
            --color-primary-light: #f43f5e; /* Default: Rose 500 */
            
            --color-obsidian: var(--color-bg-base);
            --color-rose: var(--color-primary);

            /* Atmospheric Bleed */
            --shadow-tint: 0px 0px 0px rgba(0,0,0,0);
            --highlight-tint: 0px 0px 0px rgba(255,255,255,0);

            /* Atmosphere */
            --color-blob-1: #4c0519;
            --color-blob-2: #1e1b4b;
        }
        body {
            background-color: var(--color-bg-base);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            transition: background-color 1.5s ease;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            background:
                radial-gradient(ellipse 60% 50% at 20% 30%, var(--color-blob-1) 0%, transparent 70%),
                radial-gradient(ellipse 70% 60% at 80% 70%, var(--color-blob-2) 0%, transparent 70%),
                var(--color-bg-base);
            transition: background 3s ease;
        }
        .cinematic-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.6) 100%);
        }
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwBAMAAAClLOS0AAAAElBMVEUAAAAAAAAAAAAAAAAAAAAAAADgKxmiAAAABnRSTlMFCA0RFRkMN4ZOAAAAgUlEQVQ4y83SMQ6AMAxE0YjCBbj/WcggZbBlp2GBhv+b0SjFLGnlqFa75RkQkGgFGBRgE2BpEwCTAPssAI8EYFCAoQDTCF6vAN8F4GbAl+tz/wTwLICjhICEgETzXwBO5R93AXjht28B/uiPBHiUcF2A3RR7AphqOe8CcA7Aow81SM4LXHZ2tQAAAABJRU5ErkJggg==");
            background-repeat: repeat;
            background-size: 48px 48px;
            mix-blend-mode: overlay;
        }
        
        /* Glitch Effect Classes */
        .glitch-active {
            animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
        }
        .glitch-active::before, .glitch-active::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--color-bg-base);
        }
        .glitch-active::before {
            left: 2px;
            text-shadow: -1px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }
        .glitch-active::after {
            left: -2px;
            text-shadow: -1px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(12px, 9999px, 82px, 0); }
            20% { clip: rect(84px, 9999px, 9px, 0); }
            40% { clip: rect(32px, 9999px, 5px, 0); }
            60% { clip: rect(12px, 9999px, 2px, 0); }
            80% { clip: rect(66px, 9999px, 33px, 0); }
            100% { clip: rect(91px, 9999px, 96px, 0); }
        }
        @keyframes glitch-skew {
            0% { transform: skew(1deg); }
            20% { transform: skew(-1deg); }
            40% { transform: skew(2deg); }
            60% { transform: skew(0deg); }
            80% { transform: skew(-2deg); }
            100% { transform: skew(0deg); }
        }
        ::-webkit-scrollbar { width: 0px; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="haze-overlay" style="position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;transition:backdrop-filter 1s ease,opacity 0.5s ease;"></div>
    <div id="root"></div>
    <div class="mesh-bg"></div>
    <div class="cinematic-overlay"></div>
    <div class="noise"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
